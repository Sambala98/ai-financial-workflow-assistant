services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_financial_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: ai_financial_db
    ports:
      - "5433:5432"
    volumes:
      - ai_financial_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_financial_redis
    ports:
      - "6379:6379"

volumes:
  ai_financial_pgdata:
